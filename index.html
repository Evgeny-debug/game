<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo Survivor Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; color: white; }
        canvas { display: block; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; background:rgba(0,0,0,0.8); z-index:100; }
        .btn { padding: 20px 40px; font-size: 2rem; background: #fff; color: #000; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="menu" class="overlay">
    <h1>TURBO SURVIVOR</h1>
    <button class="btn" onclick="startGame()">START</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let w, h, gameState = 'MENU', player, enemies = [], bullets = [], particles = [], gems = [];
let gameTime = 0, lastTime = 0, level = 1, theme = { bg: '#050505', p: '#00ffff' };

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Player {
    constructor() {
        this.x = 0; this.y = 0; this.radius = 8; // Менший розмір
        this.speed = 7; this.color = theme.p;
        this.damage = 20; this.fireRate = 10; this.cooldown = 0;
    }
    update() {
        // Логіка джойстика (як у попередній версії)
        if (this.cooldown > 0) this.cooldown--;
        else this.shoot();
    }
    shoot() {
        if (enemies.length === 0) return;
        let target = enemies[0]; // Найпростіший вибір цілі
        const angle = Math.atan2(target.y - this.y, target.x - this.x);
        bullets.push({x: this.x, y: this.y, vx: Math.cos(angle)*15, vy: Math.sin(angle)*15, life: 50});
        this.cooldown = this.fireRate;
    }
    draw() {
        ctx.fillStyle = theme.p;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
    }
}

class Enemy {
    constructor(isBig) {
        this.isBig = isBig;
        this.x = player.x + (Math.random()-0.5)*2000; // Велика арена
        this.y = player.y + (Math.random()-0.5)*2000;
        this.hp = isBig ? 3 : 1;
        this.radius = isBig ? 20 : 10;
        this.color = isBig ? '#bf00ff' : '#ff3333';
    }
    update() {
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * (this.isBig ? 1.5 : 3);
        this.y += Math.sin(angle) * (this.isBig ? 1.5 : 3);
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
    }
}

function spawnParticles(x, y, color) {
    for(let i=0; i<8; i++) {
        particles.push({x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color});
    }
}

function startGame() {
    document.getElementById('menu').style.display = 'none';
    player = new Player();
    gameState = 'PLAYING';
    requestAnimationFrame(loop);
}

function loop(t) {
    if(gameState !== 'PLAYING') return;
    const dt = (t - lastTime) / 1000; lastTime = t;
    
    // Оновлення
    player.update();
    if(Math.random() < 0.1) enemies.push(new Enemy(Math.random() < 0.2));
    
    enemies.forEach((e, i) => {
        e.update();
        bullets.forEach((b, bi) => {
            if(Math.hypot(e.x - b.x, e.y - b.y) < e.radius) {
                e.hp--;
                bullets.splice(bi, 1);
                if(e.hp <= 0) {
                    spawnParticles(e.x, e.y, e.color);
                    enemies.splice(i, 1);
                }
            }
        });
    });

    // Рендер
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0,0,w,h);
    
    ctx.save();
    ctx.translate(w/2 - player.x, h/2 - player.y);
    player.draw();
    enemies.forEach(e => e.draw());
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
        if(p.life <= 0) particles.splice(i, 1);
    });
    ctx.restore();
    
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
