<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Операція: Відплата</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #0057b7; color: #fff; border: none; border-radius: 10px; }
        canvas { display: block; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 10; pointer-events: none; font-size: 20px; }
    </style>
</head>
<body>
    <div id="overlay"><button id="start-btn">ДО БОЮ!</button></div>
    <div id="ui">Рахунок: <span id="score">0</span> | <span id="mode-text">HIMARS</span></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const modeText = document.getElementById('mode-text');
        
        let score = 0, mode = 'himars', running = false;
        let objects = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            running = true;
            loop();
        };

        window.ontouchstart = (e) => {
            const x = e.touches[0].clientX;
            const y = e.touches[0].clientY;
            
            if (y < 100 && x < 200) { mode = mode === 'himars' ? 'ppo' : 'himars'; modeText.innerText = mode.toUpperCase(); return; }

            if (mode === 'himars') {
                objects.push({ type: 'rocket', x: x, y: 0, targetY: y, active: true });
            } else {
                objects.push({ type: 'bullet', x: canvas.width/2, y: canvas.height, tx: x, ty: y, active: true });
            }
        };

        function loop() {
            if (!running) return;
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Спавн ворогів
            if (Math.random() < 0.03) {
                objects.push({ type: 'enemy', x: Math.random() * canvas.width, y: -20, active: true });
            }

            objects.forEach((obj, i) => {
                if (obj.type === 'rocket') {
                    ctx.fillStyle = 'yellow';
                    ctx.fillRect(obj.x, obj.y += 10, 4, 20);
                    if (obj.y >= obj.targetY) {
                        ctx.beginPath(); ctx.arc(obj.x, obj.y, 40, 0, Math.PI*2); ctx.fillStyle = 'red'; ctx.fill();
                        obj.active = false; score += 10;
                    }
                } else if (obj.type === 'bullet') {
                    ctx.fillStyle = 'lime';
                    obj.x += (obj.tx - canvas.width/2) / 10;
                    obj.y += (obj.ty - canvas.height) / 10;
                    ctx.fillRect(obj.x, obj.y, 4, 10);
                    if (obj.y < 0) obj.active = false;
                } else if (obj.type === 'enemy') {
                    ctx.fillStyle = obj.hit ? 'white' : 'red';
                    ctx.fillRect(obj.x, obj.y += 2, 30, 30);
                    
                    // Перевірка влучань
                    objects.forEach(p => {
                        if ((p.type === 'bullet') && Math.hypot(p.x - obj.x, p.y - obj.y) < 40) {
                            obj.active = false; p.active = false; score += 50;
                        }
                    });
                }
                if (obj.y > canvas.height) obj.active = false;
            });

            objects = objects.filter(o => o.active);
            scoreEl.innerText = score;
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
