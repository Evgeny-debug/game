<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бавовна 3000</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-red: #ff3b3b;
            --neon-orange: #ff9800;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #1a233a 0%, var(--bg-color) 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none; /* Запобігає свайпам на мобільному */
            perspective: 1000px; /* Для 3D ефектів */
        }

        /* Глазморфізм UI */
        .glass-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 30px;
            z-index: 100;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 250px;
        }

        .glass-panel h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.9);
        }

        .glass-panel p {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-red);
            text-shadow: 0 0 10px rgba(255, 59, 59, 0.5);
        }

        /* Ігровий простір */
        #game-board {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
            transition: transform 0.3s ease-out;
        }

        /* Цілі */
        .target {
            position: absolute;
            font-size: 3.5rem;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            will-change: left, top;
        }

        /* Ракети */
        .missile {
            position: absolute;
            width: 6px;
            height: 25px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--neon-orange), 0 0 30px var(--neon-red);
            transform-origin: bottom center;
            will-change: left, top;
            pointer-events: none;
            z-index: 50;
        }

        /* Вибух (3D анімація) */
        .explosion {
            position: absolute;
            font-size: 4rem;
            pointer-events: none;
            animation: explodeAnim 0.6s forwards cubic-bezier(0.1, 0.9, 0.2, 1);
            text-shadow: 0 0 30px var(--neon-red);
            z-index: 60;
        }

        @keyframes explodeAnim {
            0% { transform: scale(0.5) rotateX(0deg) rotateY(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotateX(180deg) rotateY(90deg); opacity: 0.8; }
            100% { transform: scale(2) rotateX(360deg) rotateY(180deg); opacity: 0; filter: blur(5px); }
        }

        /* Декоративні зірки/пил на фоні для глибини */
        .star {
            position: absolute;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Бавовна 3000</h1>
        <p>Рахунок: <span id="score">0</span></p>
    </div>

    <div id="game-board"></div>

    <script>
        const board = document.getElementById('game-board');
        const scoreEl = document.getElementById('score');
        let score = 0;
        
        // Генерація фонового пилу для 3D ефекту
        for(let i=0; i<50; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.transform = `translateZ(-${Math.random() * 500}px)`;
            board.appendChild(star);
        }

        // Ігрові масиви
        let targets = [];
        let missiles = [];

        const targetEmojis = ['🚢', '🏛️']; // Російський корабель та будівля (москов сіті/кремль)

        // Спавн цілей
        function spawnTarget() {
            const el = document.createElement('div');
            el.className = 'target';
            el.innerText = targetEmojis[Math.floor(Math.random() * targetEmojis.length)];
            
            // Випадкова висота у верхній половині екрану
            const startY = Math.random() * (window.innerHeight * 0.4) + 50; 
            const direction = Math.random() > 0.5 ? 1 : -1; // 1 = зліва направо, -1 = справа наліво
            const startX = direction === 1 ? -100 : window.innerWidth + 100;
            
            el.style.top = `${startY}px`;
            el.style.left = `${startX}px`;
            
            board.appendChild(el);
            
            targets.push({
                element: el,
                x: startX,
                y: startY,
                speed: (Math.random() * 2 + 1.5) * direction,
                width: 50,
                height: 50
            });
        }

        setInterval(spawnTarget, 1200);

        // Запуск ракети по тапу/кліку
        window.addEventListener('pointerdown', (e) => {
            const startX = window.innerWidth / 2;
            const startY = window.innerHeight;
            const targetX = e.clientX;
            const targetY = e.clientY;

            // 3D нахил ігрового поля від дотику
            const rotateX = ((targetY / window.innerHeight) - 0.5) * -20;
            const rotateY = ((targetX / window.innerWidth) - 0.5) * 20;
            board.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            
            // Повернення дошки у вихідне положення
            setTimeout(() => {
                board.style.transform = 'rotateX(0deg) rotateY(0deg)';
            }, 300);

            // Створення ракети
            const missileEl = document.createElement('div');
            missileEl.className = 'missile';
            missileEl.style.left = `${startX}px`;
            missileEl.style.top = `${startY}px`;
            
            // Обчислення кута повороту ракети
            const angle = Math.atan2(targetY - startY, targetX - startX) * 180 / Math.PI;
            missileEl.style.transform = `rotate(${angle + 90}deg)`; // +90 бо ракета дивиться вгору
            
            board.appendChild(missileEl);

            // Швидкість ракети
            const distance = Math.hypot(targetX - startX, targetY - startY);
            const duration = distance / 15; // Швидкість польоту
            
            const dx = (targetX - startX) / duration;
            const dy = (targetY - startY) / duration;

            missiles.push({
                element: missileEl,
                x: startX,
                y: startY,
                dx: dx,
                dy: dy,
                life: duration,
                active: true
            });
        });

        // Ігровий цикл (рух та колізії)
        function gameLoop() {
            // Рух цілей
            for (let i = targets.length - 1; i >= 0; i--) {
                let t = targets[i];
                t.x += t.speed;
                t.element.style.left = `${t.x}px`;

                // Легка 3D ротація під час руху
                t.element.style.transform = `rotateY(${t.x * 0.2}deg) rotateZ(${Math.sin(t.x * 0.05) * 5}deg)`;

                // Видалення, якщо вийшли за екран
                if (t.x > window.innerWidth + 150 || t.x < -150) {
                    t.element.remove();
                    targets.splice(i, 1);
                }
            }

            // Рух ракет та перевірка влучань
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i];
                if (!m.active) continue;

                m.x += m.dx;
                m.y += m.dy;
                m.life--;

                m.element.style.left = `${m.x}px`;
                m.element.style.top = `${m.y}px`;

                // Перевірка колізії (AABB)
                let hit = false;
                for (let j = targets.length - 1; j >= 0; j--) {
                    let t = targets[j];
                    // Спрощена перевірка радіусу (близько 40px)
                    const dist = Math.hypot(m.x - (t.x + 25), m.y - (t.y + 25));
                    
                    if (dist < 45) { // Влучання!
                        // Створення вибуху
                        const explosion = document.createElement('div');
                        explosion.className = 'explosion';
                        explosion.innerText = '💥';
                        explosion.style.left = `${t.x}px`;
                        explosion.style.top = `${t.y}px`;
                        board.appendChild(explosion);
                        
                        setTimeout(() => explosion.remove(), 600);

                        // Оновлення рахунку
                        score += 100;
                        scoreEl.innerText = score;

                        // Очищення DOM та масивів
                        t.element.remove();
                        targets.splice(j, 1);
                        hit = true;
                        break;
                    }
                }

                if (hit || m.life <= 0) {
                    m.element.remove();
                    missiles.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // Запуск гри
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
