<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Survivor: TURBO</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #030308; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; user-select: none;
            touch-action: none; -webkit-touch-callout: none;
        }
        canvas { display: block; touch-action: none; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
        }

        #hud { padding: 15px; display: none; }
        .bar-container { width: 100%; max-width: 300px; height: 14px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; margin-bottom: 8px; border: 2px solid rgba(255,255,255,0.2); }
        #hp-bar { height: 100%; background: #ff0055; width: 100%; transition: width 0.1s; box-shadow: 0 0 10px #ff0055;}
        #exp-bar { height: 100%; background: #00ffff; width: 0%; transition: width 0.1s; box-shadow: 0 0 10px #00ffff;}
        .stats { font-size: 1.1rem; font-weight: bold; text-shadow: 1px 1px 3px #000; margin-bottom: 2px;}
        #timer { position: absolute; top: 15px; right: 15px; font-size: 1.8rem; font-weight: bold; color: #fff; text-shadow: 0 0 15px #fff;}

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 8, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto; z-index: 100;
        }
        h1 { font-size: 3.5rem; color: #ff0055; text-shadow: 0 0 25px #ff0055; margin: 0 0 10px 0; text-transform: uppercase; font-style: italic;}
        h2 { font-size: 2.5rem; color: #00ffff; margin-bottom: 20px; text-shadow: 0 0 20px #00ffff; }
        
        .btn {
            background: rgba(0, 0, 0, 0.8); color: #fff; border: 3px solid #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            padding: 15px 50px; font-size: 1.5rem; cursor: pointer; text-transform: uppercase; border-radius: 10px; font-weight: bold;
        }
        .btn:active { background: #00ffff; color: #000; box-shadow: 0 0 40px #00ffff; transform: scale(0.9); }

        #level-up { display: none; padding: 15px; box-sizing: border-box; }
        .cards-container { display: flex; gap: 15px; flex-direction: row; justify-content: center; width: 100%; max-width: 900px; }
        .card {
            background: rgba(10, 10, 30, 0.95); border: 2px solid #b700ff; border-radius: 15px;
            flex: 1; padding: 20px 15px; text-align: center; cursor: pointer; box-shadow: 0 0 20px rgba(183, 0, 255, 0.3);
        }
        .card:active { transform: scale(0.95); background: rgba(40, 20, 60, 0.9); box-shadow: 0 0 40px #b700ff; border-color: #f0f; }
        .card h3 { color: #f0f; font-size: 1.4rem; margin-top: 0; margin-bottom: 10px; text-transform: uppercase;}
        .card p { color: #ddd; font-size: 1rem; line-height: 1.3; margin: 0; font-weight: bold;}

        @media (max-width: 600px) {
            .cards-container { flex-direction: column; }
            .card { width: 100%; box-sizing: border-box; padding: 15px;}
            h1 { font-size: 2.5rem; }
        }

        #game-over { display: none; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div id="hud">
            <div class="stats">РІВЕНЬ: <span id="lvl-val">1</span></div>
            <div class="bar-container"><div id="exp-bar"></div></div>
            <div class="stats">HP: <span id="hp-val">100</span>/<span id="max-hp-val">100</span></div>
            <div class="bar-container"><div id="hp-bar"></div></div>
            <div id="timer">00:00</div>
        </div>
    </div>

    <div id="main-menu" class="overlay">
        <h1>TURBO SURVIVOR</h1>
        <p style="font-size:1.1rem; color:#ccc; margin-bottom: 40px; text-align:center;">
            Динамічний автошутер.<br>Тягни пальцем, щоб рухатись.
        </p>
        <button class="btn" onclick="startGame()">ГРАТИ</button>
    </div>

    <div id="level-up" class="overlay">
        <h2>АПГРЕЙД!</h2>
        <div class="cards-container" id="upgrade-cards"></div>
    </div>

    <div id="game-over" class="overlay">
        <h1 style="color: #ff0055; text-shadow: 0 0 40px #ff0055;">ЗНИЩЕНО</h1>
        <p style="font-size: 1.5rem; margin-bottom: 10px;">Час: <span id="final-time" style="color:#00ffff">00:00</span></p>
        <p style="font-size: 1.5rem; margin-bottom: 40px;">Рівень: <span id="final-lvl" style="color:#b700ff">1</span></p>
        <button class="btn" onclick="location.reload()">ЗНОВУ</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let width, height;
function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// Джойстик: збільшено maxRadius для плавнішого управління
const joystick = { active: false, baseX: 0, baseY: 0, x: 0, y: 0, maxRadius: 60, touchId: null };

// Клавіатура для тестів на ПК
const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameState !== 'PLAYING') return;
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (!joystick.active) {
            const touch = e.changedTouches[i];
            joystick.active = true; joystick.touchId = touch.identifier;
            joystick.baseX = touch.clientX; joystick.baseY = touch.clientY;
            joystick.x = touch.clientX; joystick.y = touch.clientY;
            break;
        }
    }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!joystick.active || gameState !== 'PLAYING') return;
    for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        if (touch.identifier === joystick.touchId) { joystick.x = touch.clientX; joystick.y = touch.clientY; break; }
    }
}, {passive: false});

function handleTouchEnd(e) {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        if (touch.identifier === joystick.touchId) { joystick.active = false; joystick.touchId = null; break; }
    }
}
canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
canvas.addEventListener('touchcancel', handleTouchEnd, {passive: false});

// Аудіо
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function playSound(type) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);

    if (type === 'shoot') {
        osc.type = 'square'; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.05);
        gain.gain.setValueAtTime(0.015, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.start(t); osc.stop(t + 0.05);
    } else if (type === 'hit') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.08);
        gain.gain.setValueAtTime(0.02, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        osc.start(t); osc.stop(t + 0.08);
    } else if (type === 'gem') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(1000, t); osc.frequency.exponentialRampToValueAtTime(1500, t + 0.05);
        gain.gain.setValueAtTime(0.02, t); gain.gain.linearRampToValueAtTime(0, t + 0.05);
        osc.start(t); osc.stop(t + 0.05);
    } else if (type === 'levelup') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(400, t); osc.frequency.setValueAtTime(600, t+0.1); osc.frequency.setValueAtTime(1000, t+0.2);
        gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0, t + 0.5);
        osc.start(t); osc.stop(t + 0.5);
    }
}

let gameState = 'MENU', lastTime = 0, gameTime = 0, screenShake = 0;
const camera = { x: 0, y: 0 };
let player, enemies = [], bullets = [], gems = [], texts = [], particles = [], playerTrails = [];

const ALL_UPGRADES = [
    { name: "Шкода", desc: "Кулі б'ють болючіше (+10)", apply: () => player.damage += 10 },
    { name: "Кулемет", desc: "Стріляє як скажений", apply: () => player.fireRate = Math.max(3, player.fireRate - 2) },
    { name: "Турбо", desc: "Ще швидший рух", apply: () => player.speed += 0.8 },
    { name: "Дробовик", desc: "+1 куля за раз", apply: () => player.multishot += 1 },
    { name: "Пробиття", desc: "Кулі прошивають наскрізь", apply: () => player.pierce += 1 },
    { name: "Магніт", desc: "Пилососить кристали", apply: () => player.magnet += 60 },
    { name: "Лікування", desc: "Макс. ХП +20 та фул відхил", apply: () => { player.maxHp += 20; player.hp = player.maxHp; updateHUD(); } }
];

class Player {
    constructor() {
        this.x = 0; this.y = 0; 
        this.radius = 8; // Менший гравець для масштабності
        this.speed = 5.5; this.color = '#00ffff';
        
        this.maxHp = 100; this.hp = 100;
        this.level = 1; this.exp = 0; this.maxExp = 15; 
        
        this.damage = 15;
        this.fireRate = 12; 
        this.cooldown = 0;
        this.multishot = 1;
        this.pierce = 1;
        this.magnet = 120; // Трохи збільшено початковий магніт
    }

    update() {
        let dx = 0; let dy = 0;
        
        if (joystick.active) {
            let jdx = joystick.x - joystick.baseX;
            let jdy = joystick.y - joystick.baseY;
            let dist = Math.hypot(jdx, jdy);
            
            if (dist > 0) {
                let force = dist / joystick.maxRadius;
                if(force > 1) force = 1;
                dx = (jdx / dist) * force;
                dy = (jdy / dist) * force;
            }
        } else {
            if (keys.w || keys.ArrowUp) dy -= 1; if (keys.s || keys.ArrowDown) dy += 1;
            if (keys.a || keys.ArrowLeft) dx -= 1; if (keys.d || keys.ArrowRight) dx += 1;
            if (dx !== 0 && dy !== 0) { const l = Math.hypot(dx, dy); dx /= l; dy /= l; }
        }

        this.x += dx * this.speed;
        this.y += dy * this.speed;

        if (dx !== 0 || dy !== 0) {
            if (Math.random() > 0.4) {
                playerTrails.push({x: this.x, y: this.y, life: 10});
            }
        }

        if (this.cooldown > 0) this.cooldown--;
        else this.shoot();
    }

    shoot() {
        if (enemies.length === 0) return;
        
        let nearest = null; let minDist = Infinity;
        for (let e of enemies) {
            const dist = Math.hypot(this.x - e.x, this.y - e.y);
            if (dist < minDist && dist < window.innerWidth) { minDist = dist; nearest = e; }
        }

        if (nearest) {
            playSound('shoot');
            const angleToTarget = Math.atan2(nearest.y - this.y, nearest.x - this.x);
            const spread = 0.2;

            for (let i = 0; i < this.multishot; i++) {
                const offset = (this.multishot === 1) ? 0 : (i - (this.multishot - 1) / 2) * spread;
                const angle = angleToTarget + offset;
                const speed = 18; 
                bullets.push(new Bullet(
                    this.x, this.y, 
                    Math.cos(angle) * speed, Math.sin(angle) * speed, 
                    this.damage, this.pierce
                ));
            }
            this.cooldown = this.fireRate;
        }
    }

    draw() {
        playerTrails.forEach(t => {
            ctx.globalAlpha = t.life / 10;
            ctx.beginPath(); ctx.arc(t.x, t.y, this.radius * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
        });
        ctx.globalAlpha = 1;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 15; ctx.shadowColor = this.color;
        ctx.fill(); ctx.shadowBlur = 0;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.magnet, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
        ctx.stroke();
    }

    gainExp(amount) {
        this.exp += amount;
        if (this.exp >= this.maxExp) this.levelUp();
        updateHUD();
    }

    levelUp() {
        playSound('levelup');
        this.exp -= this.maxExp;
        this.level++;
        this.maxExp = Math.floor(this.maxExp * 1.3); 
        
        gameState = 'LEVELUP';
        document.getElementById('level-up').style.display = 'flex';
        
        const shuffled = [...ALL_UPGRADES].sort(() => 0.5 - Math.random());
        const choices = shuffled.slice(0, 3);
        
        const container = document.getElementById('upgrade-cards');
        container.innerHTML = '';
        choices.forEach(choice => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${choice.name}</h3><p>${choice.desc}</p>`;
            card.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                choice.apply();
                document.getElementById('level-up').style.display = 'none';
                joystick.active = false; 
                gameState = 'PLAYING';
                updateHUD();
            });
            container.appendChild(card);
        });
    }

    takeDamage(amount) {
        this.hp -= amount;
        screenShake = 8;
        updateHUD();
        if (this.hp <= 0) {
            gameState = 'GAMEOVER';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('game-over').style.display = 'flex';
            
            const mins = Math.floor(gameTime / 60).toString().padStart(2, '0');
            const secs = Math.floor(gameTime % 60).toString().padStart(2, '0');
            document.getElementById('final-time').innerText = `${mins}:${secs}`;
            document.getElementById('final-lvl').innerText = this.level;
        }
    }
}

class Bullet {
    constructor(x, y, vx, vy, damage, pierce) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.damage = damage; this.pierce = pierce;
        this.radius = 3; this.life = 60; // Трохи менша куля
        this.hitEnemies = new Set();
    }
    update() { this.x += this.vx; this.y += this.vy; this.life--; }
    draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff';
        ctx.fill(); ctx.shadowBlur = 0;
    }
}

class Enemy {
    constructor(x, y, hp, speed, damage, radius, color) {
        this.x = x; this.y = y;
        this.maxHp = hp; this.hp = hp;
        this.speed = speed; this.damage = damage;
        this.radius = radius; this.color = color;
        this.knockbackX = 0; this.knockbackY = 0;
    }
    update() {
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        if (Math.abs(this.knockbackX) > 0.1 || Math.abs(this.knockbackY) > 0.1) {
            this.x += this.knockbackX; this.y += this.knockbackY;
            this.knockbackX *= 0.8; this.knockbackY *= 0.8;
        } else {
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;
        }
    }
    draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = Math.abs(this.knockbackX) > 1 ? '#fff' : this.color;
        ctx.fill();
        
        if (this.hp < this.maxHp) {
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(this.x - 8, this.y - this.radius - 6, 16, 3);
            ctx.fillStyle = '#ff0055';
            ctx.fillRect(this.x - 8, this.y - this.radius - 6, 16 * (this.hp/this.maxHp), 3);
        }
    }
}

class Gem {
    constructor(x, y, exp) { this.x = x; this.y = y; this.exp = exp; this.radius = 4; } // Менший кристал
    update() {
        const dist = Math.hypot(player.x - this.x, player.y - this.y);
        if (dist < player.magnet) {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            const speed = 20 * (1 - dist/player.magnet); 
            this.x += Math.cos(angle) * Math.max(speed, 5);
            this.y += Math.sin(angle) * Math.max(speed, 5);
        }
    }
    draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#b700ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#b700ff';
        ctx.fill(); ctx.shadowBlur = 0;
    }
}

class FloatingText {
    constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 20; this.vy = -1.5; }
    update() { this.y += this.vy; this.life--; }
    draw() {
        ctx.globalAlpha = this.life / 20; ctx.fillStyle = this.color; ctx.font = 'bold 14px sans-serif';
        ctx.fillText(this.text, this.x, this.y); ctx.globalAlpha = 1;
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        const a = Math.random() * Math.PI * 2; const s = Math.random() * 5 + 2;
        this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
        this.life = Math.random() * 15 + 10; this.radius = Math.random() * 2.5 + 1;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vx *= 0.85; this.vy *= 0.85; this.life--; }
    draw() {
        ctx.globalAlpha = this.life / 25; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fillStyle = this.color; ctx.fill(); ctx.globalAlpha = 1;
    }
}

let waveTimer = 0;
function spawnEnemies(dt) {
    waveTimer += dt;
    const spawnInterval = Math.max(0.4, 2.0 - (gameTime / 60)); 
    
    if (waveTimer >= spawnInterval) {
        waveTimer = 0;
        
        const count = Math.floor(Math.random() * 4) + 4 + Math.floor(gameTime / 15);
        const angle = Math.random() * Math.PI * 2;
        // Змінено логіку радіусу спавну, щоб враги не з'являлися на екрані на широких моніторах
        const dist = Math.hypot(width, height) / 2 + 80;
        const baseX = player.x + Math.cos(angle) * dist;
        const baseY = player.y + Math.sin(angle) * dist;

        const enemyHp = 10 + (gameTime * 0.15); 
        const enemySpeed = 1.8 + (gameTime * 0.01);

        for(let i=0; i<count; i++) {
            const offsetX = (Math.random() - 0.5) * 80;
            const offsetY = (Math.random() - 0.5) * 80;
            
            const isFast = Math.random() < 0.2; 
            const hp = isFast ? enemyHp * 0.5 : enemyHp;
            const speed = isFast ? enemySpeed * 1.5 : enemySpeed;
            const color = isFast ? '#ff00ff' : '#ff0055';
            const rad = isFast ? 6 : 9; // Зменшені враги

            enemies.push(new Enemy(baseX + offsetX, baseY + offsetY, hp, speed, 10, rad, color));
        }
    }
}

function updateHUD() {
    document.getElementById('lvl-val').innerText = player.level;
    document.getElementById('hp-val').innerText = Math.max(0, Math.floor(player.hp));
    document.getElementById('max-hp-val').innerText = player.maxHp;
    document.getElementById('hp-bar').style.width = `${(player.hp/player.maxHp)*100}%`;
    document.getElementById('exp-bar').style.width = `${(player.exp/player.maxExp)*100}%`;
}

function startGame() {
    initAudio(); 
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    
    player = new Player();
    enemies = []; bullets = []; gems = []; texts = []; particles = []; playerTrails = [];
    gameTime = 0; waveTimer = 0; joystick.active = false;
    lastTime = performance.now();
    gameState = 'PLAYING';
    updateHUD();
    requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
    if (gameState === 'MENU' || gameState === 'GAMEOVER') return;
    
    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    if (gameState === 'PLAYING') {
        gameTime += dt;
        
        const mins = Math.floor(gameTime / 60).toString().padStart(2, '0');
        const secs = Math.floor(gameTime % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${mins}:${secs}`;

        player.update();
        playerTrails.forEach(t => t.life--);
        playerTrails = playerTrails.filter(t => t.life > 0);

        spawnEnemies(dt);

        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.update();
            if (b.life <= 0) { bullets.splice(i, 1); continue; }

            for (let j = enemies.length - 1; j >= 0; j--) {
                let e = enemies[j];
                if (b.hitEnemies.has(e)) continue;

                if (Math.hypot(b.x - e.x, b.y - e.y) < b.radius + e.radius) {
                    playSound('hit'); b.hitEnemies.add(e);
                    
                    e.hp -= b.damage;
                    const kbAngle = Math.atan2(e.y - b.y, e.x - b.x);
                    e.knockbackX = Math.cos(kbAngle) * 8; e.knockbackY = Math.sin(kbAngle) * 8; 

                    texts.push(new FloatingText(e.x, e.y - 20, b.damage, '#fff'));
                    for(let p=0; p<3; p++) particles.push(new Particle(e.x, e.y, '#fff'));

                    // БАГФІКС: Спершу перевіряємо чи вмер ворог, а вже потім віднімаємо пробиття пулі
                    if (e.hp <= 0) {
                        gems.push(new Gem(e.x, e.y, 1));
                        for(let p=0; p<8; p++) particles.push(new Particle(e.x, e.y, e.color));
                        enemies.splice(j, 1);
                    }

                    b.pierce--;
                    if (b.pierce <= 0) { bullets.splice(i, 1); break; }
                }
            }
        }

        for (let e of enemies) {
            e.update();
            if (Math.hypot(player.x - e.x, player.y - e.y) < player.radius + e.radius) {
                player.takeDamage(e.damage * dt * 2); 
            }
        }

        for (let i = gems.length - 1; i >= 0; i--) {
            let g = gems[i]; g.update();
            if (Math.hypot(player.x - g.x, player.y - g.y) < player.radius + g.radius) {
                playSound('gem'); player.gainExp(g.exp);
                gems.splice(i, 1);
            }
        }

        texts.forEach((t, i) => { t.update(); if (t.life <= 0) texts.splice(i, 1); });
        particles.forEach((p, i) => { p.update(); if (p.life <= 0) particles.splice(i, 1); });

        camera.x = player.x - width / 2;
        camera.y = player.y - height / 2;
    }

    draw();
    if (gameState !== 'GAMEOVER') requestAnimationFrame(gameLoop);
}

function draw() {
    ctx.fillStyle = '#030308';
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
        screenShake *= 0.8;
        if (screenShake < 0.5) screenShake = 0;
    }
    ctx.translate(-camera.x, -camera.y);

    ctx.strokeStyle = '#0a0a1a'; ctx.lineWidth = 2;
    const gridSize = 60; // Зменшена сітка для ілюзії більшого простору
    const startX = Math.floor(camera.x / gridSize) * gridSize;
    const startY = Math.floor(camera.y / gridSize) * gridSize;
    
    ctx.beginPath();
    for (let x = startX; x < startX + width + gridSize; x += gridSize) { ctx.moveTo(x, startY); ctx.lineTo(x, startY + height + gridSize); }
    for (let y = startY; y < startY + height + gridSize; y += gridSize) { ctx.moveTo(startX, y); ctx.lineTo(startX + width + gridSize, y); }
    ctx.stroke();

    ctx.globalCompositeOperation = 'lighter';
    gems.forEach(g => g.draw());
    enemies.forEach(e => e.draw());
    bullets.forEach(b => b.draw());
    particles.forEach(p => p.draw());
    player.draw();

    ctx.globalCompositeOperation = 'source-over';
    texts.forEach(t => t.draw());
    ctx.restore();

    if (joystick.active && gameState === 'PLAYING') {
        ctx.globalAlpha = 0.2;
        ctx.beginPath(); ctx.arc(joystick.baseX, joystick.baseY, joystick.maxRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#00ffff'; ctx.fill();
        
        let dx = joystick.x - joystick.baseX; let dy = joystick.y - joystick.baseY;
        let dist = Math.hypot(dx, dy);
        if (dist > joystick.maxRadius) { dx = (dx / dist) * joystick.maxRadius; dy = (dy / dist) * joystick.maxRadius; }

        ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.arc(joystick.baseX + dx, joystick.baseY + dy, 20, 0, Math.PI * 2);
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}
</script>
