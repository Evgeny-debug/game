<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Знищувач Свиней: Відплата</title>
    <style>
        body { margin: 0; background: #0b0f19; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .hud { font-size: 20px; font-weight: bold; color: #00ff66; text-shadow: 0 0 5px #000; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        button { padding: 15px 30px; font-size: 20px; border: 2px solid #0057b7; background: transparent; color: white; border-radius: 10px; cursor: pointer; }
        #victory { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #0057b7, #000); align-items: center; justify-content: center; font-size: 40px; font-weight: bold; text-align: center; z-index: 200; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: #ffd700;">ОБЕРИ РЕЖИМ</h1>
    <button onclick="startGame('slicer')">🗡️ РІЗАК (Ninja)</button>
    <button onclick="startGame('shooter')">🔫 КАЛАШ (Тир)</button>
    <button onclick="startGame('slingshot')">🪃 РОГАТКА</button>
</div>

<div id="victory">СЛАВА УКРАЇНІ!<br><small style="font-size: 20px">Героям Слава!</small></div>

<div id="ui"><div class="hud">ОЧКИ: <span id="score">0</span></div></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
let score = 0, gameMode = '', running = false;
let entities = [], particles = [];

// --- ЗВУКОВИЙ РУШІЙ (Синтезатор) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type === 'hit') { osc.frequency.value = 400; gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); }
    if(type === 'shoot') { osc.frequency.value = 100; gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05); }
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

// --- ІГРОВІ ОБ'ЄКТИ ---
function spawnPig() {
    return { x: Math.random() * canvas.width, y: canvas.height + 50, vx: (Math.random()-0.5)*4, vy: -Math.random()*5 - 5, radius: 30, color: '#ffaaaa' };
}

function startGame(mode) {
    gameMode = mode; running = true;
    document.getElementById('menu').style.display = 'none';
    requestAnimationFrame(loop);
}

// --- УПРАВЛІННЯ ---
let drag = { active: false, startX: 0, startY: 0 };
window.addEventListener('pointerdown', (e) => {
    drag = { active: true, startX: e.clientX, startY: e.clientY };
    if(gameMode === 'shooter') shoot(e.clientX, e.clientY);
});
window.addEventListener('pointerup', (e) => {
    if(gameMode === 'slingshot' && drag.active) fireSlingshot(e.clientX, e.clientY);
    drag.active = false;
});

function shoot(x, y) {
    playSound('shoot');
    if(navigator.vibrate) navigator.vibrate(20);
    entities.forEach((p, i) => {
        if(Math.hypot(x - p.x, y - p.y) < 50) { 
            entities.splice(i, 1); score += 10; updateScore(); playSound('hit');
            if(navigator.vibrate) navigator.vibrate(50);
        }
    });
}

function fireSlingshot(x, y) {
    // Проста логіка векторного запуску
    let velX = (drag.startX - x) * 0.1;
    let velY = (drag.startY - y) * 0.1;
    entities.push({x: drag.startX, y: drag.startY, vx: velX, vy: velY, radius: 15, isProj: true});
}

function updateScore() {
    scoreEl.innerText = score;
    if(score >= 500) { document.getElementById('victory').style.display = 'flex'; running = false; }
}

// --- ЦИКЛ ---
function loop() {
    if(!running) return;
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0, canvas.width, canvas.height);
    
    if(Math.random() < 0.02) entities.push(spawnPig());

    entities.forEach((p, i) => {
        if(!p.isProj) { p.x += p.vx; p.y += p.vy; p.vy += 0.1; } // Гравітація
        else { p.x += p.vx; p.y += p.vy; p.vy += 0.2; }

        ctx.fillStyle = p.color || '#ff8888';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.fillText('🐷', p.x-10, p.y+5);

        if(p.y > canvas.height + 100) entities.splice(i, 1);
    });

    requestAnimationFrame(loop);
}

resize();
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
</script>
</body>
</html>
