<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Свинська Навала</title>
    <style>
        body { margin: 0; padding: 0; background: #0b0f19; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .score { font-size: 24px; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="ui">
        <div class="score">Рахунок: <span id="val">0</span></div>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('val');
    let score = 0, speedMult = 1;
    let pigs = [], particles = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    class Pig {
        constructor() {
            this.x = Math.random() * (canvas.width - 50) + 25;
            this.y = -50;
            this.size = 40 + Math.random() * 20;
            this.speed = (1 + Math.random() * 2) * speedMult;
        }
        update() { this.y += this.speed; }
        draw() {
            ctx.font = `${this.size}px Arial`;
            ctx.fillText('🐷', this.x, this.y);
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.life = 1.0;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= 0.02; }
        draw() {
            ctx.fillStyle = `rgba(255, 100, 100, ${this.life})`;
            ctx.fillRect(this.x, this.y, 6, 6);
        }
    }

    function spawnPig() { if(Math.random() < 0.05) pigs.push(new Pig()); }

    window.addEventListener('pointerdown', (e) => {
        pigs.forEach((p, i) => {
            if (Math.hypot(e.clientX - (p.x + p.size/2), e.clientY - (p.y + p.size/2)) < p.size) {
                for(let j=0; j<10; j++) particles.push(new Particle(p.x, p.y));
                pigs.splice(i, 1);
                score++;
                scoreVal.innerText = score;
                speedMult += 0.05; // Збільшуємо складність
            }
        });
    });

    function loop() {
        ctx.fillStyle = 'rgba(11, 15, 25, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        spawnPig();
        
        pigs.forEach((p, i) => {
            p.update(); p.draw();
            if (p.y > canvas.height) pigs.splice(i, 1);
        });

        particles.forEach((p, i) => {
            p.update(); p.draw();
            if (p.life <= 0) particles.splice(i, 1);
        });

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
